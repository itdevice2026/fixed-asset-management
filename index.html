<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Company Fixed Asset Management</title>
<style>
:root{
  color-scheme: light;
  --surface-1:#fcfcfb; --page:#f9f9f7;
  --ink-1:#0b0b0b; --ink-2:#52514e; --ink-3:#898781;
  --grid:#e1e0d9; --axis:#c3c2b7; --ring:rgba(11,11,11,0.10);
  --accent:#2a78d6; --accent-soft:#cde2fb;
  --good:#0ca30c; --good-text:#006300; --warn:#fab219; --serious:#ec835a; --critical:#d03b3b;
  --btn-bg:#0b0b0b; --btn-ink:#ffffff;
}
@media (prefers-color-scheme: dark){
  :root:not([data-theme="light"]){
    color-scheme: dark;
    --surface-1:#1a1a19; --page:#0d0d0d;
    --ink-1:#ffffff; --ink-2:#c3c2b7; --ink-3:#898781;
    --grid:#2c2c2a; --axis:#383835; --ring:rgba(255,255,255,0.10);
    --accent:#3987e5; --accent-soft:#184f95;
    --good-text:#0ca30c;
    --btn-bg:#ffffff; --btn-ink:#0b0b0b;
  }
}
:root[data-theme="dark"]{
  color-scheme: dark;
  --surface-1:#1a1a19; --page:#0d0d0d;
  --ink-1:#ffffff; --ink-2:#c3c2b7; --ink-3:#898781;
  --grid:#2c2c2a; --axis:#383835; --ring:rgba(255,255,255,0.10);
  --accent:#3987e5; --accent-soft:#184f95;
  --good-text:#0ca30c;
  --btn-bg:#ffffff; --btn-ink:#0b0b0b;
}
*{box-sizing:border-box}
body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;background:var(--page);color:var(--ink-1);font-size:14px;line-height:1.45;display:flex;min-height:100vh}
header{position:sticky;top:0;align-self:flex-start;height:100vh;z-index:20;background:var(--surface-1);border-right:1px solid var(--grid);width:216px;flex:0 0 216px;overflow-y:auto}
.hrow{display:flex;flex-direction:column;align-items:stretch;gap:14px;padding:16px 12px;min-height:100%}
.brand{font-weight:700;font-size:15px;white-space:nowrap;padding:4px 8px}
.brand small{display:block;font-weight:400;color:var(--ink-3);font-size:11px;margin-top:-2px}
nav{display:flex;flex-direction:column;gap:2px;overflow-y:auto;flex:1;width:100%}
nav button{appearance:none;border:0;background:none;color:var(--ink-2);font:inherit;padding:9px 12px;border-radius:8px;cursor:pointer;white-space:nowrap;text-align:left;width:100%}
nav button:hover{background:var(--page)}
nav button.on{background:var(--btn-bg);color:var(--btn-ink);font-weight:600}
main{flex:1;min-width:0;padding:22px}
@media (max-width:860px){
  body{flex-direction:column}
  header{width:auto;max-width:100%;height:auto;flex:none;border-right:0;border-bottom:1px solid var(--grid);overflow:hidden}
  .hrow{flex-direction:row;align-items:center;gap:12px;height:52px;padding:0 14px;min-height:0;min-width:0}
  nav{flex-direction:row;overflow-x:auto;overflow-y:hidden;min-width:0}
  nav button{width:auto;text-align:center}
  main{padding:16px}
}
h2{font-size:18px;margin:0 0 4px}
h3{font-size:14px;margin:0 0 10px}
.sub{color:var(--ink-3);font-size:12.5px;margin:0 0 16px}
.card{background:var(--surface-1);border:1px solid var(--grid);border-radius:12px;padding:16px;margin-bottom:16px}
.grid{display:grid;gap:12px}
.tiles{grid-template-columns:repeat(auto-fit,minmax(200px,1fr))}
.tile .lbl{font-size:12px;color:var(--ink-2)}
.tile .val{font-size:26px;font-weight:600;margin-top:2px}
.tile .sub2{font-size:11.5px;color:var(--ink-3);margin-top:2px}
.two{grid-template-columns:1fr 1fr}
@media (max-width:860px){.two{grid-template-columns:1fr}}
table{width:100%;border-collapse:collapse;font-size:13px}
th{color:var(--ink-3);font-weight:500;text-align:left;padding:7px 10px;border-bottom:1px solid var(--grid);font-size:11.5px;text-transform:uppercase;letter-spacing:.03em;white-space:nowrap}
td{padding:8px 10px;border-bottom:1px solid var(--grid);vertical-align:top}
tr:last-child td{border-bottom:0}
tbody tr.click{cursor:pointer}
tbody tr.click:hover td{background:var(--page)}
td.num,th.num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
.pill{display:inline-block;padding:2px 9px;border-radius:99px;font-size:11.5px;font-weight:600;border:1px solid var(--ring)}
.pill.active,.pill.received{color:var(--good-text)}
.pill.ordered,.pill.partially_received,.pill.under_repair{color:var(--ink-2)}
.pill.disposed,.pill.cancelled,.pill.lost{color:var(--critical)}
.pill.draft{color:var(--ink-3)}
button.btn{appearance:none;border:0;background:var(--btn-bg);color:var(--btn-ink);font:inherit;font-weight:600;padding:8px 14px;border-radius:9px;cursor:pointer}
button.btn:hover{opacity:.85}
button.btn2{appearance:none;border:1px solid var(--grid);background:var(--surface-1);color:var(--ink-1);font:inherit;padding:7px 12px;border-radius:9px;cursor:pointer}
button.btn2:hover{background:var(--page)}
button.btn3{appearance:none;border:0;background:none;color:var(--accent);font:inherit;font-weight:600;padding:4px 6px;border-radius:6px;cursor:pointer;font-size:12.5px}
button.mini{appearance:none;border:1px solid var(--grid);background:none;color:var(--ink-2);font-size:12px;padding:3px 9px;border-radius:7px;cursor:pointer}
button.mini:hover{background:var(--page)}
button.danger{color:var(--critical)}
.bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
.bar .sp{flex:1}
input,select,textarea{font:inherit;color:var(--ink-1);background:var(--surface-1);border:1px solid var(--axis);border-radius:8px;padding:7px 10px;width:100%}
input:focus,select:focus,textarea:focus{outline:2px solid var(--accent);outline-offset:0;border-color:transparent}
label{display:block;font-size:12px;color:var(--ink-2);margin:10px 0 4px;font-weight:500}
label:first-child{margin-top:0}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:0 14px}
.frow3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0 14px}
@media (max-width:640px){.frow,.frow3{grid-template-columns:1fr}}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:flex-start;justify-content:center;z-index:50;padding:4vh 16px;overflow:auto}
.overlay.on{display:flex}
.modal{background:var(--surface-1);border-radius:14px;max-width:680px;width:100%;padding:20px;border:1px solid var(--ring)}
.modal.wide{max-width:1040px}
.overlay.on{padding-top:3vh}
.modal.wide .itemrow{grid-template-columns:2fr 1fr 90px 150px 30px;gap:10px}
.modal.wide .frow,.modal.wide .frow3{gap:0 18px}
@media (max-width:720px){.itemrow,.modal.wide .itemrow{grid-template-columns:1fr}}
.modal h3{font-size:16px;margin:0 0 12px}
.mhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.x{appearance:none;border:0;background:none;font-size:20px;color:var(--ink-3);cursor:pointer;line-height:1}
.mfoot{display:flex;gap:10px;justify-content:flex-end;margin-top:18px}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--btn-bg);color:var(--btn-ink);padding:10px 18px;border-radius:10px;font-weight:600;display:none;z-index:99;max-width:90vw}
.chart .row{display:grid;grid-template-columns:150px 1fr 90px;align-items:center;gap:10px;margin-bottom:8px}
.chart .cl{font-size:12.5px;color:var(--ink-2);text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chart .tr{height:18px;position:relative}
.chart .fill{height:100%;background:var(--accent);border-radius:0 4px 4px 0;min-width:2px}
.chart .cv{font-size:12px;color:var(--ink-1);font-variant-numeric:tabular-nums;white-space:nowrap}
.empty{color:var(--ink-3);text-align:center;padding:26px 10px;font-size:13px}
.kv{display:grid;grid-template-columns:auto 1fr;gap:4px 16px;font-size:13px}
.kv .k{color:var(--ink-3)}
.itemrow{display:grid;grid-template-columns:1fr 130px 62px 110px 30px;gap:8px;margin-bottom:8px;align-items:center}
.note{font-size:12px;color:var(--ink-3);margin-top:8px}
.tabs2{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.tabs2 button{appearance:none;border:1px solid var(--grid);background:var(--surface-1);color:var(--ink-2);font:inherit;font-size:12.5px;padding:6px 12px;border-radius:99px;cursor:pointer}
.tabs2 button.on{background:var(--btn-bg);color:var(--btn-ink);border-color:transparent;font-weight:600}
.scroll{overflow-x:auto}
.right{text-align:right}
#printarea{display:none}
@media print{
  body.printing>*{display:none !important}
  body.printing #printarea{display:block !important}
  .print-doc{font-family:system-ui,-apple-system,sans-serif;color:#000;padding:6px}
  .print-doc img{max-width:220px}
  .print-tag{border:2px solid #000;border-radius:10px;padding:14px 18px;width:330px;text-align:center;margin:0 auto}
  .print-tag .code{font-size:34px;font-weight:800;letter-spacing:1px;font-family:ui-monospace,monospace;margin:4px 0}
  .sigline{border-top:1px solid #000;margin-top:40px;padding-top:4px;font-size:12px}
  .print-doc table{width:100%;border-collapse:collapse}
}
.userbadge{display:flex;align-items:center;flex-wrap:wrap;gap:6px;font-size:12.5px;color:var(--ink-2);padding:10px 8px 2px;border-top:1px solid var(--grid)}
@media (max-width:860px){.userbadge{border-top:0;padding:0;flex-wrap:nowrap;white-space:nowrap}}
.userbadge .who{font-weight:600;color:var(--ink-1)}
.rolechip{display:inline-block;padding:1px 8px;border-radius:99px;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;border:1px solid var(--ring);color:var(--ink-2)}
.pill.pending{color:var(--ink-2)} .pill.approved{color:var(--good-text)} .pill.rejected{color:var(--critical)} .pill.converted{color:var(--accent)}
.auth{position:fixed;inset:0;background:var(--page);display:none;align-items:center;justify-content:center;z-index:200;padding:24px}
.auth.on{display:flex}
.authcard{background:var(--surface-1);border:1px solid var(--grid);border-radius:16px;padding:28px;max-width:430px;width:100%;box-shadow:0 8px 40px rgba(0,0,0,.08)}
.authcard h1{font-size:20px;margin:0 0 2px}
.brandlogos{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:18px}
.brandlogos .blogo{background:#fff;border:1px solid var(--grid);border-radius:9px;padding:6px 9px;height:48px;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.brandlogos .blogo img{max-height:34px;max-width:98px;object-fit:contain;display:block}
.authcard .sub{margin:0 0 20px}
.authcard .err{color:var(--critical);font-size:12.5px;margin-top:10px;min-height:16px}
.authcard button.btn{width:100%;margin-top:16px;padding:11px}
.brandmark{width:34px;height:34px;border-radius:9px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;margin-bottom:14px}
</style>
</head>
<body>
<div class="auth" id="authscreen"></div>
<header id="topbar" style="display:none">
  <div class="hrow">
    <div class="brand">Fixed Assets<small>All Company</small></div>
    <nav id="nav"></nav>
    <div class="userbadge" id="userbadge"></div>
    <button class="mini" id="themeBtn" title="Toggle theme">◐</button>
  </div>
</header>
<main id="main"></main>
<div class="overlay" id="overlay"><div class="modal" id="modal"></div></div>
<div id="toast"></div>
<div id="printarea"></div>

<script>
/* ================= CONFIG ================= */
const SUPABASE_URL = "https://emkcwukiqxnvcbhkjiqz.supabase.co";
const SUPABASE_KEY = "sb_publishable_u_qnmEI8oHI9Z_A0-Hht3Q_Yvaa7Ork";
const ADMIN_FN = SUPABASE_URL + "/functions/v1/fam-admin";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* ================= HELPERS ================= */
const $ = (s, r) => (r || document).querySelector(s);
const $$ = (s, r) => Array.from((r || document).querySelectorAll(s));
const h = s => s == null ? "" : String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const fmt = n => "₱" + Number(n || 0).toLocaleString("en-PH", {minimumFractionDigits: 2, maximumFractionDigits: 2});
const fmtC = n => { n = Number(n||0); const a = Math.abs(n);
  if (a >= 1e6) return "₱" + (n/1e6).toFixed(1) + "M";
  if (a >= 1e4) return "₱" + (n/1e3).toFixed(1) + "K";
  return "₱" + n.toLocaleString("en-PH", {maximumFractionDigits: 0}); };
const dstr = s => s ? new Date(s + (s.length === 10 ? "T00:00:00" : "")).toLocaleDateString("en-PH", {year:"numeric",month:"short",day:"numeric"}) : "—";
const today = () => { const d = new Date(); return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0"); };
const pill = s => '<span class="pill ' + h(s) + '">' + h((s||"").replace(/_/g," ")) + '</span>';

let toastTimer;
function toast(msg, bad) {
  const t = $("#toast");
  t.textContent = msg; t.style.display = "block";
  t.style.background = bad ? "var(--critical)" : "var(--btn-bg)";
  t.style.color = bad ? "#fff" : "var(--btn-ink)";
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.style.display = "none", bad ? 5000 : 2600);
}
function err(e) { console.error(e); toast((e && (e.message || e.details)) || "Something went wrong", true); }

function openModal(html, wide) { const m = $("#modal"); m.innerHTML = html; m.classList.toggle("wide", !!wide); $("#overlay").classList.add("on"); }
function closeModal() { $("#overlay").classList.remove("on"); $("#modal").innerHTML = ""; $("#modal").classList.remove("wide"); }
let _confirmCb = null;
function confirmModal(title, body, okLabel, cb) {
  _confirmCb = cb;
  openModal('<h3 style="margin:0 0 10px">' + h(title) + '</h3>' +
    '<p style="margin:0 0 18px;color:var(--muted);line-height:1.5">' + h(body) + '</p>' +
    '<div class="mfoot"><button class="btn2" onclick="closeModal()">Cancel</button>' +
    '<button class="btn danger" onclick="_runConfirm()">' + h(okLabel || "Confirm") + '</button></div>');
}
function _runConfirm() { const cb = _confirmCb; _confirmCb = null; if (cb) cb(); }
document.addEventListener("click", e => { if (e.target === $("#overlay")) closeModal(); });
document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });
const mhead = t => '<div class="mhead"><h3>' + h(t) + '</h3><button class="x" onclick="closeModal()">&times;</button></div>';

function opts(list, sel, blank, key, lab) {
  key = key || "id"; lab = lab || "name";
  let o = blank != null ? '<option value="">' + h(blank) + '</option>' : "";
  (list || []).forEach(r => o += '<option value="' + r[key] + '"' + (String(sel) === String(r[key]) ? " selected" : "") + '>' + h(r[lab]) + '</option>');
  return o;
}
function refName(list, id, lab) { const r = (list||[]).find(x => String(x.id) === String(id)); return r ? r[lab || "name"] : "—"; }
const val = id => { const e = $("#" + id); return e ? e.value.trim() : ""; };
const meName = () => (S.me && (S.me.full_name || S.me.email)) || "";
function stamp(obj) { return Object.assign({ created_by: S.me ? S.me.id : null, created_by_name: meName() }, obj); }

function monthsFull(from, to) {
  if (!from || !to) return 0;
  const a = new Date(from), b = new Date(to);
  if (b < a) return 0;
  let m = (b.getFullYear() - a.getFullYear()) * 12 + (b.getMonth() - a.getMonth());
  if (b.getDate() < a.getDate()) m -= 1;
  return Math.max(0, m);
}
function depAt(r, asof) {
  const start = r.dep_start || r.depreciation_start || r.acquisition_date;
  let cut = asof;
  if (r.disposal_date && new Date(r.disposal_date) < new Date(asof)) cut = r.disposal_date;
  const m = Math.min(r.useful_life_months, monthsFull(start, cut));
  return Math.round((r.acquisition_cost - r.salvage_value) * m / r.useful_life_months * 100) / 100;
}
function printBlock(html) {
  const pa = $("#printarea"); if (!pa) return;
  pa.innerHTML = '<div class="print-doc">' + html + '</div>';
  document.body.classList.add("printing");
  window.print();
  setTimeout(() => { document.body.classList.remove("printing"); pa.innerHTML = ""; }, 800);
}
function downloadCSV(name, cols, rows) {
  const esc = v => { v = v == null ? "" : String(v); return /[",\n]/.test(v) ? '"' + v.replace(/"/g, '""') + '"' : v; };
  const csv = [cols.map(c => esc(c.label)).join(",")]
    .concat(rows.map(r => cols.map(c => esc(typeof c.get === "function" ? c.get(r) : r[c.get])).join(",")))
    .join("\n");
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob(["﻿" + csv], {type: "text/csv"}));
  a.download = name; a.click();
}

/* ================= PERMISSIONS ================= */
const RANK = { viewer:1, editor:2, preparer:3, approver:4, admin:5 };
function myrank() { return (S.me && RANK[S.me.role]) || 0; }
const P = { view:()=>myrank()>=1, ref:()=>myrank()>=2, prepare:()=>myrank()>=3, approve:()=>myrank()>=4, admin:()=>myrank()>=5 };
function isAdmin() { return S.me && S.me.role === "admin"; }
/* ===== Delete a created transaction (admin any; creator while still early-stage) ===== */
function ownTxn(rec) { return rec && S.me && rec.created_by && String(rec.created_by) === String(S.me.id); }
function canDeleteTxn(rec, earlyStates, statusField) {
  if (P.admin()) return true;
  return ownTxn(rec) && earlyStates.indexOf(rec[statusField || "status"]) >= 0;
}
/* config per transaction kind */
const TXN_DEL = {
  ar:   { table:"fam_asset_requests",   label:"asset request",     num:"ar_number", refresh:()=>vAssetRequests() },
  pr:   { table:"fam_purchase_requests", label:"purchase requisition", num:"pr_number", refresh:()=>vRequests() },
  po:   { table:"fam_purchase_orders",  label:"purchase order",    num:"po_number", refresh:()=>vPOs() },
  disp: { table:"fam_disposals",        label:"disposal request",  num:"id",        refresh:()=>{ if (typeof vDisposals==="function") vDisposals(); } },
};
function askDeleteTxn(kind, id, num) {
  const cfg = TXN_DEL[kind]; if (!cfg) return;
  confirmModal("Delete " + cfg.label + (num ? " " + num : ""),
    "This permanently removes the " + cfg.label + " and its line items. This cannot be undone.",
    "Delete", () => txnDelete(kind, id));
}
async function txnDelete(kind, id) {
  const cfg = TXN_DEL[kind]; if (!cfg) return;
  try {
    const { data, error } = await sb.from(cfg.table).delete().eq("id", id).select("id");
    if (error) throw error;
    if (!data || !data.length) return toast("You can only delete your own pending transactions.", true);
    closeModal(); toast(cfg.label.charAt(0).toUpperCase() + cfg.label.slice(1) + " deleted");
    try { cfg.refresh(); } catch (e) {}
  } catch (e) {
    if (e && (e.code === "23503" || (e.message && /foreign key/i.test(e.message))))
      return toast("Cannot delete — it has linked records (converted or received). Cancel it instead.", true);
    err(e);
  }
}
/* company field: admin picks; scoped user is fixed to their company */
function multiCompany() { return (S.refs.companies || []).length > 1; }
function companyField(id, selected) {
  if (multiCompany()) return '<select id="' + id + '">' + opts(S.refs.companies, selected, "Select company…") + '</select>';
  const c = (S.refs.companies || [])[0];
  return '<input value="' + h(c ? c.name : "(no company assigned)") + '" disabled>' +
         '<input type="hidden" id="' + id + '" value="' + (c ? c.id : "") + '">';
}
function defaultCompany() {
  const list = S.refs.companies || [];
  if (S.me && S.me.company_id && list.some(c => String(c.id) === String(S.me.company_id))) return S.me.company_id;
  return list.length === 1 ? list[0].id : "";
}
function employeesFor(companyId) {
  const list = S.refs.employees || [];
  if (!companyId) return list;
  return list.filter(e => e.company_id == null || String(e.company_id) === String(companyId));
}
function suppliersFor(companyId) {
  const list = S.refs.suppliers || [];
  if (!companyId) return list;
  return list.filter(s => s.company_id == null || String(s.company_id) === String(companyId));
}
function companyLogoImg(companyId, px) {
  const c = (S.refs.companies || []).find(x => String(x.id) === String(companyId));
  return (c && c.logo_url) ? '<img src="' + h(c.logo_url) + '" alt="" style="height:' + (px || 40) + 'px;max-width:180px;object-fit:contain;display:block;margin:0 0 10px">' : '';
}
function depMethodOpts(sel) {

async function previewNumber(kind, companyId, dateStr, elId) {
  const el = $("#" + elId); if (!el) return;
  if (!companyId) { el.textContent = "A number is generated automatically on save — pick a company to preview it."; return; }
  const c = (S.refs.companies || []).find(x => String(x.id) === String(companyId));
  const code = (c && c.code && c.code.trim()) ? c.code.trim().toUpperCase()
    : (c ? (c.name.replace(/[^A-Za-z]/g, "").slice(0, 3).toUpperCase() || "PO") : "PO");
  const map = { ar: {table:"fam_asset_requests", dcol:"request_date", mid:"AR"}, pr: {table:"fam_purchase_requests", dcol:"request_date", mid:"PR"}, po: {table:"fam_purchase_orders", dcol:"po_date", mid:""} };
  const m = map[kind]; const table = m.table, dcol = m.dcol, mid = m.mid;
  const d = dateStr || today();
  const p = d.split("-");
  const mmddyyyy = (p[1] || "") + (p[2] || "") + (p[0] || "");
  try {
    const { count } = await sb.from(table).select("id", { count: "exact", head: true }).eq("company_id", companyId).eq(dcol, d);
    const seq = String((count || 0) + 1).padStart(3, "0");
    el.innerHTML = "Will be assigned: <strong>" + code + mid + mmddyyyy + seq + "</strong>";
  } catch (e) { el.textContent = "Number generated automatically on save."; }
}
function wirePreview(kind, companyEl, dateEl, elId) {
  const upd = () => previewNumber(kind, val(companyEl), val(dateEl), elId);
  [companyEl, dateEl].forEach(id => { const e = $("#" + id); if (e) e.addEventListener("change", upd); });
  upd();
}

async function arSetStatus(id, status) {
  try {
    const patch = { status };
    if (status === "dept_approved") patch.dept_approved_name = meName();
    const { error } = await sb.from("fam_asset_requests").update(patch).eq("id", id);
    if (error) throw error;
    toast("Request " + (AR_STATUS[status] || status)); arDetail(id); if (S.view === "arequests") vAssetRequests();
  } catch (e) { err(e); }
}
async function arConvert(id) {
  try {
    const { data: ar, error } = await sb.from("fam_asset_requests").select("*, fam_ar_items(*)").eq("id", id).single();
    if (error) throw error;
    const { data: pr, error: e1 } = await sb.from("fam_purchase_requests").insert(stamp({
      company_id: ar.company_id, ar_id: ar.id, request_date: today(), requested_by: ar.requested_by,
      department_id: ar.department_id, purpose: ar.purpose, status: "pending",
      notes: "From asset request " + (ar.ar_number || ""),
    })).select().single();
    if (e1) throw e1;
    const rows = (ar.fam_ar_items || []).map(i => ({ pr_id: pr.id, description: i.description, category_id: i.category_id, quantity: i.quantity, estimated_unit_cost: i.estimated_unit_cost }));
    if (rows.length) { const { error: e2 } = await sb.from("fam_pr_items").insert(rows); if (e2) throw e2; }
    const { error: e3 } = await sb.from("fam_asset_requests").update({ status: "converted" }).eq("id", id);

    (assets || []).forEach(a => regByItem[a.po_item_id] = (regByItem[a.po_item_id] || 0) + 1);
    const { data: receipts } = await sb.from("fam_receipts").select("*").eq("po_id", id);
    const recByItem = {}; (receipts || []).forEach(rc => recByItem[rc.po_item_id] = (recByItem[rc.po_item_id] || 0) + rc.received_qty);
    const items = po.fam_po_items || [];
    const total = items.reduce((s, i) => s + i.quantity * i.unit_cost, 0);
    const approved = ["ordered","partially_received","received"].includes(po.status);
    openModal(mhead("PO " + (po.po_number || "")) + companyLogoImg(po.company_id) +
      '<div class="kv"><div class="k">Company</div><div>' + h(po.fam_companies?po.fam_companies.name:"—") + '</div>' +
      (po.fam_purchase_requests ? '<div class="k">From request</div><div>' + h(po.fam_purchase_requests.pr_number) + '</div>' : "") +
      '<div class="k">Supplier</div><div>' + h(po.fam_suppliers ? po.fam_suppliers.name : "—") + '</div>' +
      '<div class="k">Date</div><div>' + dstr(po.po_date) + '</div>' +
      '<div class="k">Created by</div><div>' + h(po.created_by_name || "—") + '</div>' +
      '<div class="k">Status</div><div>' + pill(po.status) + '</div>' +
      (po.approved_by_name ? '<div class="k">Approved by</div><div>' + h(po.approved_by_name) + '</div>' : "") +
      '<div class="k">Total</div><div>' + fmt(total) + '</div>' +
      (po.notes ? '<div class="k">Notes</div><div>' + h(po.notes) + '</div>' : "") + '</div>' +
      (po.status === "pending" ? '<div class="note" style="margin-top:8px">This PO is awaiting approval before it can be issued and received.</div>' : "") +
      '<div class="scroll" style="margin-top:12px"><table><thead><tr><th>Item</th><th>Category</th><th class="num">Qty</th><th class="num">Unit cost</th><th class="num">Received</th><th class="num">Registered</th><th></th></tr></thead><tbody>' +
      items.map(i => { const reg = regByItem[i.id] || 0, rem = i.quantity - reg;
        const recv = recByItem[i.id] || 0, remRecv = i.quantity - recv;
        return '<tr><td>' + h(i.description) + '</td><td>' + h(refName(S.refs.categories, i.category_id)) + '</td><td class="num">' + i.quantity + '</td><td class="num">' + fmt(i.unit_cost) + '</td><td class="num">' + recv + ' / ' + i.quantity + '</td><td class="num">' + reg + ' / ' + i.quantity + '</td>' +
        '<td class="right" style="white-space:nowrap">' +
        (remRecv > 0 && approved && P.prepare() ? '<button class="btn3" onclick="receiveForm(' + po.id + ',' + i.id + ')">Receive ' + remRecv + '</button> ' : '') +
        (rem > 0 && approved && P.prepare() ? '<button class="btn3" onclick="registerForm(' + po.id + ',' + i.id + ')">Register ' + rem + '</button>' : '') + '</td></tr>'; }).join("") +
      '</tbody></table></div>' +
      '<div class="mfoot">' +
      '<button class="btn2" onclick="printTxn(\'po\',' + po.id + ')">Print</button>' +
      (receipts && receipts.length ? '<button class="btn2" onclick="printReceivingReport(' + po.id + ')">Print receiving report</button>' : "") +
      (po.status === "pending" && P.approve() ? '<button class="btn2 danger" onclick="poApprove(' + po.id + ',\'cancelled\')">Reject</button><button class="btn" onclick="poApprove(' + po.id + ',\'ordered\')">Approve &amp; issue PO</button>' : "") +
      (po.status === "draft" && P.prepare() ? '<button class="btn" onclick="poStatus(' + po.id + ',\'pending\')">Submit for approval</button>' : "") +
      ((po.status === "draft" || po.status === "pending" || po.status === "ordered") && P.approve() ? '<button class="btn2 danger" onclick="poStatus(' + po.id + ',\'cancelled\')">Cancel PO</button>' : "") +
      (canDeleteTxn(po, ["draft","pending"]) ? '<button class="btn2 danger" onclick="askDeleteTxn(\'po\',' + po.id + ',' + JSON.stringify(po.po_number || "") + ')">Delete</button>' : "") +
      '<button class="btn" onclick="closeModal()">Close</button></div>', true);
  } catch (e) { err(e); }
}
async function poApprove(id, status) {
  if (!P.approve()) return toast("You don't have permission to approve POs", true);
  try {
    const patch = { status };
    if (status === "ordered") patch.approved_by_name = meName();
    const { error } = await sb.from("fam_purchase_orders").update(patch).eq("id", id);
    if (error) throw error;
    toast(status === "ordered" ? "PO approved & issued" : "PO rejected"); poDetail(id); if (S.view === "pos") vPOs();
  } catch (e) { err(e); }
}
async function poStatus(id, status) {
  try {
    const { error } = await sb.from("fam_purchase_orders").update({ status }).eq("id", id);
    if (error) throw error;
    toast("PO updated"); poDetail(id); if (S.view === "pos") vPOs();
  } catch (e) { err(e); }
}
async function registerForm(poId, itemId) {
  try {
    const { data: item, error } = await sb.from("fam_po_items").select("*, fam_purchase_orders(supplier_id, po_date, company_id)").eq("id", itemId).single();
    if (error) throw error;
    const { count } = await sb.from("fam_assets").select("id", {count: "exact", head: true}).eq("po_item_id", itemId);
    const rem = item.quantity - (count || 0);
    const cat = (S.refs.categories || []).find(c => c.id === item.category_id);
    const parent = item.fam_purchase_orders || {};
    openModal(mhead("Register assets — " + item.description) +
      '<div class="frow3">' +
      '<div><label>Quantity</label><input type="number" id="r_qty" min="1" max="' + rem + '" value="' + rem + '"></div>' +
      '<div><label>Acquisition date</label><input type="date" id="r_date" value="' + today() + '"></div>' +
      '<div><label>Depreciation start</label><input type="date" id="r_dep" value="' + today() + '"></div></div>' +
      '<div class="frow"><div><label>Unit cost</label><input type="number" id="r_cost" step="0.01" value="' + item.unit_cost + '"></div>' +
      '<div><label>Useful life (months)</label><input type="number" id="r_life" value="' + (cat ? cat.useful_life_months : 60) + '"></div></div>' +
      '<div class="frow"><div><label>Salvage value (each)</label><input type="number" id="r_salvage" step="0.01" value="' + (cat ? (item.unit_cost * cat.salvage_rate / 100) : 0).toFixed(2) + '"></div>' +
      '<div><label>Location</label><select id="r_loc">' + opts(S.refs.locations, "", "—") + '</select></div></div>' +
      '<div class="frow"><div><label>Department</label><select id="r_dept">' + opts(S.refs.departments, "", "—") + '</select></div>' +
      '<div><label>Custodian</label><select id="r_cust">' + opts(employeesFor(parent.company_id), "", "—") + '</select></div></div>' +
      '<div class="frow"><div><label>Cost center</label><input id="r_costcenter" placeholder="e.g. Admin-101"></div>' +
      '<div><label>Depreciation method</label><select id="r_depmethod">' + depMethodOpts("straight_line") + '</select></div></div>' +
      '<div class="note">Each unit becomes one asset with its own auto code (FA-00001…). Depreciation is auto-computed straight-line.</div>' +
      '<div class="mfoot"><button class="btn2" onclick="poDetail(' + poId + ')">Back</button><button class="btn" onclick="registerSave(' + poId + ',' + itemId + ',' + (item.category_id || "null") + ',' + (parent.supplier_id || "null") + ',' + (parent.company_id || "null") + ',\'' + h(item.description).replace(/'/g, "\\'") + '\')">Register</button></div>', true);
  } catch (e) { err(e); }
}
async function registerSave(poId, itemId, catId, supplierId, companyId, name) {
  const qty = Number(val("r_qty") || 0);
  if (qty < 1) return toast("Quantity must be at least 1", true);
  const rows = [];
  for (let i = 0; i < qty; i++) rows.push({
    name, po_id: poId, po_item_id: itemId, supplier_id: supplierId, company_id: companyId, category_id: catId,
    acquisition_date: val("r_date") || today(),
    depreciation_start: val("r_dep") || val("r_date") || today(),
    acquisition_cost: Number(val("r_cost") || 0),
    salvage_value: Number(val("r_salvage") || 0),
    useful_life_months: Number(val("r_life") || 60),
    location_id: val("r_loc") || null, department_id: val("r_dept") || null, custodian_id: val("r_cust") || null,
    cost_center: val("r_costcenter") || null, depreciation_method: val("r_depmethod") || "straight_line",
  });
  try {
    const { error } = await sb.from("fam_assets").insert(rows);
    if (error) throw error;
    toast(qty + " asset(s) registered"); poDetail(poId); if (S.view === "pos") vPOs();
  } catch (e) { err(e); }
}

/* ===== Receiving Report (step 5) ===== */
async function receiveForm(poId, itemId) {
  try {
    const { data: item, error } = await sb.from("fam_po_items").select("*").eq("id", itemId).single();
    if (error) throw error;
    const { data: recs } = await sb.from("fam_receipts").select("received_qty").eq("po_item_id", itemId);
    const already = (recs || []).reduce((s, r) => s + r.received_qty, 0);
    const rem = item.quantity - already;
    openModal(mhead("Receive — " + item.description) +
      '<div class="frow3"><div><label>Received qty</label><input type="number" id="rv_qty" min="1" max="' + rem + '" value="' + rem + '"></div>' +
      '<div><label>Receipt date</label><input type="date" id="rv_date" value="' + today() + '"></div>' +
      '<div><label>Condition</label><select id="rv_cond">' + ["good","damaged","short","wrong_item"].map(c => '<option value="' + c + '">' + c.replace(/_/g," ") + '</option>').join("") + '</select></div></div>' +
      '<div class="frow"><div><label>Inspected by</label><input id="rv_by" value="' + h(S.me.full_name || "") + '"></div>' +
      '<div><label>Remarks</label><input id="rv_remarks"></div></div>' +
      '<div class="note">Ordered ' + item.quantity + ' · already received ' + already + ' · remaining ' + rem + '.</div>' +
      '<div class="mfoot"><button class="btn2" onclick="poDetail(' + poId + ')">Back</button><button class="btn" onclick="receiveSave(' + poId + ',' + itemId + ')">Record receipt</button></div>', true);
  } catch (e) { err(e); }
}
async function receiveSave(poId, itemId) {
  const qty = Number(val("rv_qty") || 0);
  if (qty < 1) return toast("Received quantity must be at least 1", true);
  try {
    const { error } = await sb.from("fam_receipts").insert({
      po_id: poId, po_item_id: itemId, received_qty: qty, condition: val("rv_cond"),
      inspected_by: val("rv_by") || null, receipt_date: val("rv_date") || today(), remarks: val("rv_remarks") || null,
    });
    if (error) throw error;
    await recomputePOStatus(poId);
    toast("Receipt recorded"); poDetail(poId); if (S.view === "pos") vPOs();
  } catch (e) { err(e); }
}
async function recomputePOStatus(poId) {
  try {
    const { data: po } = await sb.from("fam_purchase_orders").select("status, fam_po_items(id,quantity)").eq("id", poId).single();
    if (!po || po.status === "cancelled") return;
    const { data: rec } = await sb.from("fam_receipts").select("po_item_id,received_qty").eq("po_id", poId);
    const recBy = {}; (rec || []).forEach(r => recBy[r.po_item_id] = (recBy[r.po_item_id] || 0) + r.received_qty);
    const items = po.fam_po_items || [];
    const totOrder = items.reduce((s, i) => s + i.quantity, 0);
    const totRec = items.reduce((s, i) => s + Math.min(i.quantity, recBy[i.id] || 0), 0);
    let status = po.status;
    if (totRec >= totOrder && totOrder > 0) status = "received";
    else if (totRec > 0) status = "partially_received";
    if (status !== po.status) await sb.from("fam_purchase_orders").update({ status }).eq("id", poId);
  } catch (e) {}
}
async function printReceivingReport(poId) {
  try {
    const { data: po } = await sb.from("fam_purchase_orders").select("*, fam_companies(name,logo_url), fam_suppliers(name), fam_po_items(*)").eq("id", poId).single();
    const { data: receipts } = await sb.from("fam_receipts").select("*").eq("po_id", poId).order("id");
    const itById = {}; (po.fam_po_items || []).forEach(i => itById[i.id] = i);
    const co = po.fam_companies || {};
    const logo = co.logo_url ? '<img src="' + co.logo_url + '" alt="">' : "";
    let rows = (receipts || []).map(r => '<tr><td>' + dstr(r.receipt_date) + '</td><td>' + h(itById[r.po_item_id] ? itById[r.po_item_id].description : "—") + '</td><td style="text-align:right">' + r.received_qty + '</td><td>' + h((r.condition||"").replace(/_/g," ")) + '</td><td>' + h(r.inspected_by || "") + '</td><td>' + h(r.remarks || "") + '</td></tr>').join("");
    if (!rows) rows = '<tr><td colspan="6">No receipts recorded.</td></tr>';
    printBlock(logo + '<h2 style="margin:8px 0 2px">Receiving Report</h2>' +
      '<div style="font-size:13px;margin-bottom:8px">' + h(co.name || "") + ' &nbsp;·&nbsp; PO ' + h(po.po_number || "") + ' &nbsp;·&nbsp; Supplier: ' + h(po.fam_suppliers ? po.fam_suppliers.name : "—") + ' &nbsp;·&nbsp; ' + dstr(today()) + '</div>' +
      '<table border="1" cellspacing="0" cellpadding="6" style="border-collapse:collapse;font-size:12.5px"><thead><tr><th>Date</th><th>Item</th><th>Qty</th><th>Condition</th><th>Inspected by</th><th>Remarks</th></tr></thead><tbody>' + rows + '</tbody></table>' +
      '<div style="display:flex;gap:60px;margin-top:54px"><div class="sigline" style="flex:1">Received &amp; inspected by</div><div class="sigline" style="flex:1">Approved by</div></div>');
  } catch (e) { err(e); }
}
/* ===== Print a transaction document (Asset Request / Purchase Requisition / Purchase Order) ===== */
async function printTxn(kind, id) {
  try {
    const cfg = {
      ar: { table:"fam_asset_requests", sel:"*, fam_companies(name,logo_url), fam_departments(name), fam_ar_items(*)", items:"fam_ar_items", cost:"estimated_unit_cost", num:"ar_number", title:"Asset Request" },
      pr: { table:"fam_purchase_requests", sel:"*, fam_companies(name,logo_url), fam_departments(name), fam_pr_items(*)", items:"fam_pr_items", cost:"estimated_unit_cost", num:"pr_number", title:"Purchase Requisition" },
      po: { table:"fam_purchase_orders", sel:"*, fam_companies(name,logo_url), fam_suppliers(name), fam_purchase_requests(pr_number,approved_by_name), fam_po_items(*)", items:"fam_po_items", cost:"unit_cost", num:"po_number", title:"Purchase Order" },
    }[kind];
    if (!cfg) return;
    const { data: t, error } = await sb.from(cfg.table).select(cfg.sel).eq("id", id).single();
    if (error) throw error;
    const co = t.fam_companies || {};
    const items = t[cfg.items] || [];
    const tot = items.reduce((s,i)=>s + i.quantity * Number(i[cfg.cost] || 0), 0);
    const logo = co.logo_url ? '<img src="' + co.logo_url + '" alt="">' : "";
    const dept = t.fam_departments ? t.fam_departments.name : "";
    const dateStr = dstr(t.request_date || t.po_date);
    const preparedBy = t.created_by_name || t.requested_by || "";
    let approvedBy = "";
    if (kind === "ar") approvedBy = t.budget_owner || t.dept_approved_name || "";
    else if (kind === "pr") approvedBy = t.approved_by_name || "";
    else if (kind === "po") approvedBy = (t.fam_purchase_requests ? t.fam_purchase_requests.approved_by_name : "") || "";
    const rows = items.map(i => '<tr><td>' + h(i.description) + '</td><td>' + h(refName(S.refs.categories, i.category_id)) + '</td><td style="text-align:right">' + i.quantity + '</td><td style="text-align:right">' + fmt(i[cfg.cost]) + '</td><td style="text-align:right">' + fmt(i.quantity * Number(i[cfg.cost] || 0)) + '</td></tr>').join("") || '<tr><td colspan="5">No items.</td></tr>';
    printBlock(
      logo + '<h2 style="margin:8px 0 2px">' + cfg.title + '</h2>' +
      '<div style="font-size:13px;margin-bottom:4px"><strong>' + h(co.name || "") + '</strong></div>' +
      '<table style="font-size:12.5px;margin-bottom:8px"><tr><td style="padding-right:28px"><strong>No.:</strong> ' + h(t[cfg.num] || "—") + '</td><td><strong>Date:</strong> ' + dateStr + '</td></tr>' +
      (kind === "po"
        ? '<tr><td style="padding-right:28px"><strong>Supplier:</strong> ' + h(t.fam_suppliers ? t.fam_suppliers.name : "—") + '</td>' + (t.fam_purchase_requests ? '<td><strong>From PR:</strong> ' + h(t.fam_purchase_requests.pr_number) + '</td>' : '<td></td>') + '</tr>'
        : '<tr><td style="padding-right:28px"><strong>Department:</strong> ' + h(dept || "—") + '</td><td><strong>Requested by:</strong> ' + h(t.requested_by || "—") + '</td></tr>') +
      (t.purpose ? '<tr><td colspan="2"><strong>Purpose:</strong> ' + h(t.purpose) + '</td></tr>' : '') +
      '</table>' +
      '<table border="1" cellspacing="0" cellpadding="6" style="border-collapse:collapse;font-size:12.5px;width:100%"><thead><tr><th align="left">Item</th><th align="left">Category</th><th>Qty</th><th>Unit cost</th><th>Total</th></tr></thead><tbody>' + rows +
      '<tr><td colspan="4" style="text-align:right"><strong>Total</strong></td><td style="text-align:right"><strong>' + fmt(tot) + '</strong></td></tr></tbody></table>' +
      (kind === "ar" && t.budget_amount != null ? '<div style="font-size:12px;margin-top:8px"><strong>Approved budget:</strong> ' + fmt(t.budget_amount) + (t.budget_source ? ' · ' + h(t.budget_source) : "") + '</div>' : "") +
      (t.notes ? '<div style="font-size:12px;margin-top:8px"><strong>Notes:</strong> ' + h(t.notes) + '</div>' : "") +
      '<div style="display:flex;gap:60px;margin-top:56px"><div class="sigline" style="flex:1">Prepared by' + (preparedBy ? ': ' + h(preparedBy) : "") + '</div><div class="sigline" style="flex:1">Approved by' + (approvedBy ? ': ' + h(approvedBy) : "") + '</div></div>');
  } catch (e) { err(e); }
}
</script>
<script>

function renderAssetTable() {

    '<div class="scroll"><table><thead><tr><th>Code</th><th>Asset</th><th>Company</th><th>Category</th><th>Acquired</th><th class="num">Cost</th><th class="num">Accum. dep.</th><th class="num">NBV</th><th>Custodian</th><th>Status</th></tr></thead><tbody>' +
    rows.map(r => '<tr class="click" onclick="assetDetail(' + r.id + ')"><td><strong>' + h(r.asset_code) + '</strong></td><td>' + h(r.name) + '</td><td>' + h(r.company_name || "—") + '</td><td>' + h(r.category_name || "—") + '</td><td>' + dstr(r.acquisition_date) + '</td><td class="num">' + fmt(r.acquisition_cost) + '</td><td class="num">' + fmt(r.accumulated_depreciation) + '</td><td class="num">' + fmt(r.net_book_value) + '</td><td>' + h(r.custodian_name || "—") + '</td><td>' + pill(r.status) + '</td></tr>').join("") +
    '</tbody></table></div><div class="note">' + rows.length + ' asset(s) · Cost ' + fmt(rows.reduce((s, r) => s + +r.acquisition_cost, 0)) + ' · NBV ' + fmt(rows.reduce((s, r) => s + +r.net_book_value, 0)) + '</div>'

function printAssetTag() {

  const logo = c && c.logo_url ? '<img src="' + c.logo_url + '" alt="" style="height:34px;margin-bottom:6px">' : "";

}
function printAccountability() {
  const r = window._curAsset; if (!r) return;
  const c = (S.refs.companies || []).find(x => String(x.id) === String(r.company_id));
  const logo = c && c.logo_url ? '<img src="' + c.logo_url + '" alt="">' : "";
  const rowsD = [["Company", c ? c.name : ""],["Asset code", r.asset_code],["Description", r.name],["Category", r.category_name || ""],["Serial / Model", (r.serial_number || "—") + " / " + (r.model || "—")],["Acquisition date", dstr(r.acquisition_date)],["Acquisition cost", fmt(r.acquisition_cost)],["Cost center", r.cost_center || "—"],["Department", r.department_name || "—"],["Location", r.location_name || "—"],["Custodian", r.custodian_name || "—"]];

function depAtDate(r, dateStr) {
  const start = r.dep_start || r.depreciation_start || r.acquisition_date;
  const m = Math.min(r.useful_life_months, monthsFull(start, dateStr));
  const acc = Math.round((r.acquisition_cost - r.salvage_value) * m / r.useful_life_months * 100) / 100;
  return Math.round((r.acquisition_cost - acc - Number(r.accumulated_impairment || 0)) * 100) / 100;
}

    if (error) throw error;
    const bv = depAtDate(r, val("d_date") || today());
    const proceeds = Number(val("d_proceeds") || 0);
    const { error: e1 } = await sb.from("fam_disposals").insert(stamp({
      asset_id: assetId, disposal_date: val("d_date") || today(), method: val("d_method"),
      proceeds, book_value_at_disposal: bv, gain_loss: Math.round((proceeds - bv) * 100) / 100,
      approved_by: val("d_appr") || null, notes: val("d_notes") || null, approval_status: "pending",
    }));
    if (e1) throw e1;
    closeModal(); toast("Disposal submitted for approval"); go(S.view);
  } catch (e) { err(e); }
}

  } catch (e) { err(e); }
}

/* ===== GL journal (control #5: FAR → GL) ===== */
function monthBounds(period) {
  const start = period + "-01";
  const d = new Date(period + "-01T00:00:00"); d.setMonth(d.getMonth() + 1); d.setDate(0);
  const end = period + "-" + String(d.getDate()).padStart(2, "0");
  const p = new Date(period + "-01T00:00:00"); p.setDate(0);
  const priorEnd = p.getFullYear() + "-" + String(p.getMonth() + 1).padStart(2, "0") + "-" + String(p.getDate()).padStart(2, "0");
  return { start, end, priorEnd };
}
function genDepJournal(period) {
  const { end, priorEnd } = monthBounds(period);
  const lines = [];
  REG_CACHE.forEach(r => {
    const before = depAt(r, priorEnd), after = depAt(r, end);
    const amt = Math.round((after - before) * 100) / 100;
    if (amt <= 0) return;
    lines.push({ date: end, account: "Depreciation Expense", asset_code: r.asset_code, asset: r.name, company: r.company_name || "", debit: amt, credit: 0, memo: "Monthly depreciation" });
    lines.push({ date: end, account: "Accumulated Depreciation", asset_code: r.asset_code, asset: r.name, company: r.company_name || "", debit: 0, credit: amt, memo: "Monthly depreciation" });
  });
  return lines;
}
function genDispJournal(period) {
  const { start, end } = monthBounds(period);
  const costOf = {}; REG_CACHE.forEach(r => costOf[r.id] = r);
  const lines = [];
  (window._allDisposals || []).filter(d => d.approval_status === "approved" && d.disposal_date >= start && d.disposal_date <= end).forEach(d => {
    const a = costOf[d.asset_id] || {}; const code = a.asset_code || ("#" + d.asset_id); const nm = a.name || "";
    const cost = Number(a.acquisition_cost || 0), bv = Number(d.book_value_at_disposal || 0), proceeds = Number(d.proceeds || 0), gl = Number(d.gain_loss || 0);
    const accdep = Math.round((cost - bv) * 100) / 100;
    if (proceeds) lines.push({ date: d.disposal_date, account: "Cash / Proceeds", asset_code: code, asset: nm, company: a.company_name || "", debit: proceeds, credit: 0, memo: "Disposal (" + d.method + ")" });
    if (accdep) lines.push({ date: d.disposal_date, account: "Accumulated Depreciation", asset_code: code, asset: nm, company: a.company_name || "", debit: accdep, credit: 0, memo: "Remove accumulated depreciation" });
    if (gl < 0) lines.push({ date: d.disposal_date, account: "Loss on Disposal", asset_code: code, asset: nm, company: a.company_name || "", debit: Math.round(-gl * 100) / 100, credit: 0, memo: "Loss on disposal" });
    lines.push({ date: d.disposal_date, account: "Fixed Asset (cost)", asset_code: code, asset: nm, company: a.company_name || "", debit: 0, credit: cost, memo: "Remove asset cost" });
    if (gl > 0) lines.push({ date: d.disposal_date, account: "Gain on Disposal", asset_code: code, asset: nm, company: a.company_name || "", debit: 0, credit: Math.round(gl * 100) / 100, memo: "Gain on disposal" });
  });
  return lines;
}
function jrnTable(lines) {
  const dr = lines.reduce((s, l) => s + l.debit, 0), cr = lines.reduce((s, l) => s + l.credit, 0);
  if (!lines.length) return '<div class="empty">No entries for this period.</div>';
  return '<div class="scroll"><table><thead><tr><th>Date</th><th>Account</th><th>Asset</th><th class="num">Debit</th><th class="num">Credit</th></tr></thead><tbody>' +
    lines.map(l => '<tr><td>' + dstr(l.date) + '</td><td>' + h(l.account) + '</td><td>' + h(l.asset_code) + ' <span style="color:var(--ink-3)">' + h(l.asset) + '</span></td><td class="num">' + (l.debit ? fmt(l.debit) : "") + '</td><td class="num">' + (l.credit ? fmt(l.credit) : "") + '</td></tr>').join("") +
    '</tbody><tfoot><tr><td colspan="3"><strong>Total</strong></td><td class="num"><strong>' + fmt(dr) + '</strong></td><td class="num"><strong>' + fmt(cr) + '</strong></td></tr></tfoot></table></div>';
}

function logoPick(input, hid) {
  const file = input.files && input.files[0];
  if (!file) return;
  if (file.size > 4 * 1024 * 1024) { toast("Image too large (max 4MB)", true); input.value = ""; return; }
  const rd = new FileReader();
  rd.onload = () => {
    const img = new Image();
    img.onload = () => {
      const maxW = 260, scale = Math.min(1, maxW / img.width);
      const w = Math.round(img.width * scale), ht = Math.round(img.height * scale);
      const cv = document.createElement("canvas"); cv.width = w; cv.height = ht;
      cv.getContext("2d").drawImage(img, 0, 0, w, ht);
      let url; try { url = cv.toDataURL("image/png"); } catch (e) { url = rd.result; }
      const hidEl = $("#" + hid); if (hidEl) hidEl.value = url;
      const prev = $("#" + hid + "_prev"); if (prev) prev.innerHTML = '<img src="' + url + '" alt="" style="max-height:64px;border:1px solid var(--grid);border-radius:8px;padding:4px;background:#fff">';
    };
    img.onerror = () => toast("Could not read that image", true);
    img.src = rd.result;
  };
  rd.readAsDataURL(file);
}

  downloadCSV("employees_template.csv",

    [{employee_id:"EMP-0001",last_name:"Dela Cruz",middle_name:"Santos",first_name:"Juan",department:"Accounting",location:"Head Office",supervisor:"Maria Reyes",position:"Accountant",employee_type:"Regular",company:c.name || ""}]);

function parseCSV(text) {
  const rows = []; let field = "", row = [], inQ = false;
  text = String(text).replace(/\r\n/g, "\n").replace(/\r/g, "\n");
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQ) { if (c === '"') { if (text[i+1] === '"') { field += '"'; i++; } else inQ = false; } else field += c; }
    else if (c === '"') inQ = true;
    else if (c === ",") { row.push(field); field = ""; }
    else if (c === "\n") { row.push(field); rows.push(row); row = []; field = ""; }
    else field += c;
  }
  if (field !== "" || row.length) { row.push(field); rows.push(row); }
  return rows.filter(r => r.some(c => String(c).trim() !== ""));
}
async function bulkImport() {
  if (!P.ref()) return toast("You don't have permission to import", true);
  const input = $("#bulk_file");
  const file = input && input.files && input.files[0];
  if (!file) return toast("Choose a CSV file first", true);
  const btn = $("#bulk_btn"); if (btn) { btn.disabled = true; btn.textContent = "Importing…"; }
  const setStatus = t => { const s = $("#bulk_status"); if (s) s.textContent = t; };
  try {
    const text = await file.text();
    const rows = parseCSV(text);
    if (rows.length < 2) throw new Error("The file has no data rows.");
    const norm = s => String(s).toLowerCase().replace(/[^a-z]/g, "");
    const header = rows[0].map(norm);
    const col = (...names) => { for (const n of names) { const i = header.indexOf(n); if (i >= 0) return i; } return -1; };
    const iId = col("employeeid","id","empid"), iLast = col("lastname","last","surname"),
      iFirst = col("firstname","first","givenname"), iMid = col("middlename","middle","middleinitial","mi"),
      iPos = col("position","title","role","designation"), iDept = col("department","dept"), iCo = col("company","companyname","companycode"),
      iLoc = col("location","loc","branch","site"), iSup = col("immediatesupervisor","supervisor","reportsto","superior"),
      iType = col("employeetype","employmenttype","emptype","type");
    if (iLast < 0) throw new Error('No "Last Name" column found in the header row.');
    const deptByName = {}; (S.refs.departments || []).forEach(d => deptByName[norm(d.name)] = d.id);
    const coByKey = {}; (S.refs.companies || []).forEach(co => { coByKey[norm(co.name)] = co.id; if (co.code) coByKey[norm(co.code)] = co.id; });
    const locByName = {}; (S.refs.locations || []).forEach(l => locByName[norm(l.name)] = l.id);
    const defCo = defaultCompany() || null;
    // auto-create any locations that don't exist yet
    let createdLoc = 0;
    if (iLoc >= 0) {
      const wanted = {};
      for (let r = 1; r < rows.length; r++) { const ln = (rows[r][iLoc] || "").trim(); if (ln && !locByName[norm(ln)]) wanted[norm(ln)] = ln; }
      const toAdd = Object.values(wanted);
      if (toAdd.length) {
        const { data: newLocs, error: le } = await sb.from("fam_locations").insert(toAdd.map(n => ({ name: n }))).select("id,name");
        if (le) throw le;
        (newLocs || []).forEach(l => locByName[norm(l.name)] = l.id);
        createdLoc = (newLocs || []).length;
      }
    }
    const withId = [], noId = []; let unresolvedDept = 0, unresolvedCo = 0, skipped = 0;
    for (let r = 1; r < rows.length; r++) {
      const c = rows[r];
      const last = (c[iLast] || "").trim();
      if (!last) { skipped++; continue; }
      const first = iFirst >= 0 ? (c[iFirst] || "").trim() : "";
      const mid = iMid >= 0 ? (c[iMid] || "").trim() : "";
      const empId = iId >= 0 ? (c[iId] || "").trim() : "";
      let deptId = null;
      if (iDept >= 0) { const dn = (c[iDept] || "").trim(); if (dn) { deptId = deptByName[norm(dn)] || null; if (!deptId) unresolvedDept++; } }
      let coId = defCo;
      if (iCo >= 0) { const cn = (c[iCo] || "").trim(); if (cn) { coId = coByKey[norm(cn)] || null; if (!coId) { unresolvedCo++; coId = defCo; } } }
      const locId = iLoc >= 0 ? (locByName[norm((c[iLoc] || "").trim())] || null) : null;
      const rec = { employee_id: empId || null, last_name: last, first_name: first || null, middle_name: mid || null,
        name: composeName(last, first, mid), position: (iPos >= 0 ? (c[iPos] || "").trim() : "") || null,
        department_id: deptId, location_id: locId, company_id: coId,
        supervisor: (iSup >= 0 ? (c[iSup] || "").trim() : "") || null,
        employee_type: (iType >= 0 ? (c[iType] || "").trim() : "") || null, active: true };
      (empId ? withId : noId).push(rec);
    }
    if (!withId.length && !noId.length) throw new Error("No valid rows (every row needs at least a last name).");
    let inserted = 0, updated = 0;
    if (withId.length) {
      const before = withId.length;
      const { error } = await sb.from("fam_employees").upsert(withId, { onConflict: "employee_id" });
      if (error) throw error; updated = before;
    }
    if (noId.length) {
      const { error } = await sb.from("fam_employees").insert(noId);
      if (error) throw error; inserted = noId.length;
    }
    let msg = "Imported " + (inserted + updated) + " employees";
    if (withId.length && noId.length) msg = "Imported " + noId.length + " new + " + withId.length + " by ID";
    closeModal();
    toast(msg + (skipped ? " · " + skipped + " skipped (no last name)" : "") + (unresolvedDept ? " · " + unresolvedDept + " unmatched dept" : "") + (createdLoc ? " · " + createdLoc + " locations created" : "") + (unresolvedCo ? " · " + unresolvedCo + " company defaulted" : ""));
    await loadRefs(); renderSetup();
  } catch (e) { err(e); if (btn) { btn.disabled = false; btn.textContent = "Import"; } }
}

async function callAdmin(payload) {
  const { data: { session } } = await sb.auth.getSession();

    method: "POST",
    headers: { "content-type": "application/json", "apikey": SUPABASE_KEY, "Authorization": "Bearer " + (session ? session.access_token : "") },

  let j; try { j = await r.json(); } catch (e) { j = { error: "Bad response" }; }
  if (!r.ok) throw new Error(j.error || ("HTTP " + r.status));
  return j;
}

async function maintLog(assetId, assetLabel) {
  try {
    const { data: rows, error } = await sb.from("fam_maintenance").select("*").eq("asset_id", assetId).order("log_date", {ascending:false}).order("id", {ascending:false});
    if (error) throw error;
    window._maintAsset = { id: assetId, label: assetLabel || ("#" + assetId) };
    const list = (rows && rows.length) ?
      '<div class="scroll" style="max-height:44vh;overflow:auto"><table><thead><tr><th>Date</th><th>Type</th><th>Description</th><th class="num">Cost</th><th>Vendor</th><th>Next due</th></tr></thead><tbody>' +
      rows.map(m => '<tr><td>' + dstr(m.log_date) + '</td><td>' + h((m.type||"").replace(/_/g," ")) + '</td><td>' + h(m.description || "—") + (m.remarks ? '<br><span class="note">' + h(m.remarks) + '</span>' : "") + '</td><td class="num">' + (m.cost != null ? fmt(m.cost) : "—") + '</td><td>' + h(m.vendor || "—") + '</td><td>' + (m.next_due ? dstr(m.next_due) : "—") + '</td></tr>').join("") +
      '</tbody></table></div>' : '<div class="empty">No maintenance or repairs logged for this asset.</div>';
    openModal(mhead("Maintenance & repairs — " + (assetLabel || "asset")) + list +
      '<div class="mfoot">' + (P.prepare() ? '<button class="btn2" onclick="maintForm(' + assetId + ')">+ Add log entry</button>' : '') +
      '<button class="btn" onclick="closeModal()">Close</button></div>', true);
  } catch (e) { err(e); }
}
function maintForm(assetId) {
  if (!P.prepare()) return toast("You don't have permission to log maintenance", true);
  openModal(mhead("Log maintenance / repair") +
    '<div class="frow3"><div><label>Date</label><input type="date" id="m_date" value="' + today() + '"></div>' +
    '<div><label>Type</label><select id="m_type">' + MNT_TYPES.map(t => '<option value="' + t + '">' + t + '</option>').join("") + '</select></div>' +
    '<div><label>Cost</label><input type="number" step="0.01" id="m_cost" value="0"></div></div>' +
    '<label>Description</label><textarea id="m_desc" rows="2"></textarea>' +
    '<div class="frow3"><div><label>Vendor</label><input id="m_vendor"></div>' +
    '<div><label>Performed by</label><input id="m_by" value="' + h(S.me.full_name || "") + '"></div>' +
    '<div><label>Next due</label><input type="date" id="m_next"></div></div>' +
    '<label>Remarks</label><textarea id="m_remarks" rows="2"></textarea>' +
    '<div class="mfoot"><button class="btn2" onclick="maintLog(' + assetId + ')">Cancel</button><button class="btn" onclick="maintSave(' + assetId + ')">Save entry</button></div>');
}
async function maintSave(assetId) {
  const desc = val("m_desc");
  if (!desc) return toast("Description is required", true);
  try {
    const { error } = await sb.from("fam_maintenance").insert({
      asset_id: assetId, log_date: val("m_date") || today(), type: val("m_type") || "maintenance",
      description: desc, cost: Number(val("m_cost") || 0), vendor: val("m_vendor") || null,
      performed_by: val("m_by") || null, next_due: val("m_next") || null, remarks: val("m_remarks") || null,
    });
    if (error) throw error;
    toast("Log entry saved"); maintLog(assetId, (window._maintAsset || {}).label);
  } catch (e) { err(e); }
}

/* ================= ASSET REVIEW / IMPAIRMENT ================= */
const IMP_TYPES = { impairment:"Impairment (write-down)", reversal:"Reversal (write-back)", review:"Review only (no adjustment)" };
async function impairLog(assetId, assetLabel) {
  try {
    const [{ data: rows, error }, { data: a }] = await Promise.all([
      sb.from("fam_impairments").select("*").eq("asset_id", assetId).order("review_date", {ascending:false}).order("id", {ascending:false}),
      sb.from("fam_assets").select("accumulated_impairment").eq("id", assetId).single(),
    ]);
    if (error) throw error;
    window._impAsset = { id: assetId, label: assetLabel || ("#" + assetId) };
    const accum = a ? Number(a.accumulated_impairment || 0) : 0;
    const list = (rows && rows.length) ?
      '<div class="scroll" style="max-height:42vh;overflow:auto"><table><thead><tr><th>Date</th><th>Type</th><th class="num">Amount</th><th>Reason</th><th>Status</th><th></th></tr></thead><tbody>' +
      rows.map(m => '<tr><td>' + dstr(m.review_date) + '</td><td>' + h(IMP_TYPES[m.type] || m.type) + '</td><td class="num">' + (m.type === "review" ? "—" : fmt(m.amount)) + '</td><td>' + h(m.reason || "—") + (m.remarks ? '<br><span class="note">' + h(m.remarks) + '</span>' : "") + '</td><td>' + pill(m.status) + '</td>' +
        '<td class="right">' + (m.status === "pending" && P.approve() ? '<button class="btn3" onclick="impairApprove(' + m.id + ',\'approved\')">Approve</button> <button class="btn3 danger" onclick="impairApprove(' + m.id + ',\'rejected\')">Reject</button>' : (m.approved_at ? h(dstr(m.approved_at)) : "")) + '</td></tr>').join("") +
      '</tbody></table></div>' : '<div class="empty">No impairment or review events for this asset.</div>';
    openModal(mhead("Impairment / review — " + (assetLabel || "asset")) +
      '<div class="kv" style="margin-bottom:12px"><div class="k">Accumulated impairment</div><div><strong style="color:' + (accum > 0 ? "var(--critical)" : "inherit") + '">' + fmt(accum) + '</strong></div></div>' +
      list +
      '<div class="note">Impairments and reversals affect net book value only after an Approver approves them.</div>' +
      '<div class="mfoot">' + (P.prepare() ? '<button class="btn2" onclick="impairForm(' + assetId + ')">+ Record review</button>' : '') +
      '<button class="btn" onclick="closeModal()">Close</button></div>', true);
  } catch (e) { err(e); }
}
function impairForm(assetId) {
  if (!P.prepare()) return toast("You don't have permission to record a review", true);
  openModal(mhead("Record asset review") +
    '<div class="frow"><div><label>Review date</label><input type="date" id="i_date" value="' + today() + '"></div>' +
    '<div><label>Type</label><select id="i_type">' + Object.keys(IMP_TYPES).map(t => '<option value="' + t + '">' + IMP_TYPES[t] + '</option>').join("") + '</select></div></div>' +
    '<div class="frow"><div><label>Amount (write-down / write-back)</label><input type="number" step="0.01" id="i_amount" value="0"></div>' +
    '<div><label>Reviewed by</label><input id="i_by" value="' + h(S.me.full_name || "") + '"></div></div>' +
    '<label>Reason</label><input id="i_reason" placeholder="e.g. physical damage, market value decline">' +
    '<label>Remarks</label><textarea id="i_remarks" rows="2"></textarea>' +
    '<div class="note">Amount is ignored for "Review only". Submitted as pending until approved.</div>' +
    '<div class="mfoot"><button class="btn2" onclick="impairLog(' + assetId + ')">Cancel</button><button class="btn" onclick="impairSave(' + assetId + ')">Submit for approval</button></div>');
}
async function impairSave(assetId) {
  const type = val("i_type");
  const amount = Number(val("i_amount") || 0);
  if (type !== "review" && amount <= 0) return toast("Enter an amount greater than zero", true);
  try {
    const { error } = await sb.from("fam_impairments").insert({
      asset_id: assetId, review_date: val("i_date") || today(), type,
      amount: type === "review" ? 0 : amount, reason: val("i_reason") || null,
      reviewed_by: val("i_by") || null, remarks: val("i_remarks") || null, status: "pending",
    });
    if (error) throw error;
    toast("Review submitted for approval"); impairLog(assetId, (window._impAsset || {}).label);
  } catch (e) { err(e); }
}
async function impairApprove(id, status) {
  if (!P.approve()) return toast("You don't have permission to approve", true);
  try {
    const { error } = await sb.from("fam_impairments").update({ status }).eq("id", id);
    if (error) throw error;
    toast("Review " + status);
    const a = window._impAsset || {}; impairLog(a.id, a.label);
    REG_CACHE = await fetchRegister();
  } catch (e) { err(e); }
}

/* ================= DOCUMENT ATTACHMENTS ================= */
const DOC_TYPES = ["po","invoice","receiving","disposal","photo","other"];
function fileSize(n) { n = Number(n || 0); return n < 1024 ? n + " B" : n < 1048576 ? (n/1024).toFixed(1) + " KB" : (n/1048576).toFixed(1) + " MB"; }
async function docList(assetId, assetLabel) {
  try {
    const { data: rows, error } = await sb.from("fam_documents").select("*").eq("asset_id", assetId).order("created_at", {ascending:false});
    if (error) throw error;
    window._docAsset = { id: assetId, label: assetLabel || ("#" + assetId) };
    const list = (rows && rows.length) ?
      '<div class="scroll" style="max-height:40vh;overflow:auto"><table><thead><tr><th>File</th><th>Type</th><th class="num">Size</th><th>Uploaded</th><th></th></tr></thead><tbody>' +
      rows.map(d => '<tr><td><button class="btn3" onclick="docOpen(' + JSON.stringify(d.storage_path) + ')">' + h(d.file_name) + '</button></td>' +
        '<td>' + h(d.doc_type || "—") + '</td><td class="num">' + fileSize(d.size_bytes) + '</td><td>' + dstr(d.created_at) + '<br><span class="note">' + h(d.uploaded_by || "") + '</span></td>' +
        '<td class="right">' + (P.prepare() ? '<button class="btn3 danger" onclick="docDelete(' + d.id + ',' + JSON.stringify(d.storage_path) + ')">Remove</button>' : "") + '</td></tr>').join("") +
      '</tbody></table></div>' : '<div class="empty">No documents attached to this asset.</div>';
    openModal(mhead("Documents — " + (assetLabel || "asset")) + list +
      (P.prepare() ?
        '<div class="card" style="margin-top:12px"><div class="frow"><div><label>Document type</label><select id="doc_type">' + DOC_TYPES.map(t => '<option value="' + t + '">' + t + '</option>').join("") + '</select></div>' +
        '<div><label>File</label><input type="file" id="doc_file"></div></div>' +
        '<div class="mfoot" style="margin-top:10px"><button class="btn" id="doc_up_btn" onclick="docUpload(' + assetId + ')">Upload</button></div></div>' : "") +
      '<div class="mfoot"><button class="btn" onclick="closeModal()">Close</button></div>', true);
  } catch (e) { err(e); }
}
async function docUpload(assetId) {
  const input = $("#doc_file");
  const file = input && input.files && input.files[0];
  if (!file) return toast("Choose a file first", true);
  if (file.size > 25 * 1048576) return toast("File too large (max 25 MB)", true);
  const btn = $("#doc_up_btn"); if (btn) { btn.disabled = true; btn.textContent = "Uploading…"; }
  try {
    const safe = file.name.replace(/[^a-zA-Z0-9._-]/g, "_");
    const path = "asset_" + assetId + "/" + Date.now() + "_" + safe;
    const { error: ue } = await sb.storage.from("fam-docs").upload(path, file, { contentType: file.type || "application/octet-stream", upsert: false });
    if (ue) throw ue;
    const { error: de } = await sb.from("fam_documents").insert({
      asset_id: assetId, file_name: file.name, storage_path: path,
      mime: file.type || null, size_bytes: file.size, doc_type: val("doc_type") || "other",
      uploaded_by: S.me.full_name || S.me.email || null,
    });
    if (de) throw de;
    toast("Document uploaded"); docList(assetId, (window._docAsset || {}).label);
  } catch (e) { err(e); if (btn) { btn.disabled = false; btn.textContent = "Upload"; } }
}
async function docOpen(path) {
  try {
    const { data, error } = await sb.storage.from("fam-docs").createSignedUrl(path, 120);
    if (error) throw error;
    window.open(data.signedUrl, "_blank");
  } catch (e) { err(e); }
}
async function docDelete(id, path) {
  if (!P.prepare()) return toast("You don't have permission to remove documents", true);
  try {
    await sb.storage.from("fam-docs").remove([path]);
    const { error } = await sb.from("fam_documents").delete().eq("id", id);
    if (error) throw error;
    toast("Document removed");
    const a = window._docAsset || {}; docList(a.id, a.label);
  } catch (e) { err(e); }
}

/* ================= THEME & BOOT ================= */
let themeMode = "auto";
$("#themeBtn").onclick = () => {
  themeMode = themeMode === "auto" ? "dark" : themeMode === "dark" ? "light" : "auto";
  if (themeMode === "auto") document.documentElement.removeAttribute("data-theme");
  else document.documentElement.setAttribute("data-theme", themeMode);
  toast("Theme: " + themeMode);
};
(async function boot() {
  try {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { loginScreen(); return; }
    await loadMe();
  } catch (e) { err(e); loginScreen("Could not connect. Refresh to try again."); }
})();
</script>
